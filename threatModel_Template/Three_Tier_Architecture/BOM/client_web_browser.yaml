# BOM: Client Web Browser
asset: "Client Web Browser"
software_version: "End-user browser (Chrome/Firefox/Edge — version varies by employee)"
patch_level: outdated
known_cves: []
running_services:
  - HTTP/HTTPS (client-side)
  - JavaScript execution environment
detection_level: none
credentials_stored: false
notes: >
  Client-side browser environment running on employee workstations. Patch level varies —
  some users are behind on browser updates due to corporate update policy restrictions.
  Session cookies are set with HttpOnly and Secure flags (application responsibility).
  CSP (Content Security Policy) headers should be configured on the web server to
  mitigate XSS. No server-side detection capability — client is outside the trust boundary.
  Employee awareness training on phishing and XSS-related risks is recommended.
