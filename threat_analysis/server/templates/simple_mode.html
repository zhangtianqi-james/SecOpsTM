        // Tracks active CodeMirror text marks so they can be cleared on next run.
        const _dslMarks = [];

        function _clearDslMarks(editor) {
            _dslMarks.forEach(m => { try { m.clear(); } catch(_) {} });
            _dslMarks.length = 0;
            if (editor) editor.clearGutter('dsl-gutter');
        }

        /**
         * Extract quoted names from a validator error/warning string.
         * Examples: "Duplicate name: 'Foo'" → ["Foo"]
         *           "Dataflow 'X' references unknown element 'Y'" → ["X", "Y"]
         */
        function _extractNames(msg) {
            const names = [];
            const re = /'([^']+)'/g;
            let m;
            while ((m = re.exec(msg)) !== null) names.push(m[1]);
            return names;
        }

        /**
         * Find lines in the editor that contain `name` as a bold DSL identifier
         * (i.e. **name**: or from=name or to=name) and return their 0-based line numbers.
         */
        function _findLines(editor, name) {
            const lines = [];
            const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            // Match: **Name**: or from=Name or to=Name (case-insensitive)
            const re = new RegExp(`(\\*\\*${escaped}\\*\\*|from\\s*=\\s*"?${escaped}"?|to\\s*=\\s*"?${escaped}"?)`, 'i');
            const count = editor.lineCount();
            for (let i = 0; i < count; i++) {
                if (re.test(editor.getLine(i))) lines.push(i);
            }
            return lines;
        }

        function validateDSL() {
            // Skip while a diagram update is in flight to avoid concurrent TM instantiation.
            if (_diagramInFlight) {
                clearTimeout(_validateTimer);
                _validateTimer = setTimeout(validateDSL, 600);
                return;
            }
            const activeEditor = TabManager.getActiveEditor();
            if (!activeEditor) return;
            _clearDslMarks(activeEditor);
            const content = activeEditor.getValue();
            const countEl = document.getElementById('dsl-component-count');
            const banner = document.getElementById('dsl-validation-banner');
            if (!content || !content.trim()) {
                if (banner) banner.style.display = 'none';
                if (countEl) countEl.textContent = '';
                return;
            }
            fetch('/api/validate_markdown', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({markdown_content: content})
            })
            .then(r => r.json())
            .then(data => {
                // Server returned "skipped" when concurrent TM usage was detected — silently ignore.
                if (data.skipped) return;
                if (!banner) return;

                // — Component count badge —
                if (countEl && data.component_count) {
                    const c = data.component_count;
                    countEl.textContent =
                        `${c.boundaries}B · ${c.actors}A · ${c.servers}S · ${c.dataflows}DF`;
                }

                // — Inline squiggles —
                const markMsg = (msgs, cssClass) => {
                    msgs.forEach(msg => {
                        _extractNames(msg).forEach(name => {
                            _findLines(activeEditor, name).forEach(lineNo => {
                                const lineText = activeEditor.getLine(lineNo);
                                const mark = activeEditor.markText(
                                    {line: lineNo, ch: 0},
                                    {line: lineNo, ch: lineText.length},
                                    {className: cssClass, title: msg}
                                );
                                _dslMarks.push(mark);
                            });
                        });
                    });
                };
                markMsg(data.errors || [], 'cm-dsl-error');
                markMsg(data.warnings || [], 'cm-dsl-warning');

                // — Banner — (escape server strings before innerHTML to prevent XSS)
                const _esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
                const allMessages = [
                    ...(data.errors || []).map(e => '&#x274C; ' + _esc(e)),
                    ...(data.warnings || []).map(w => '&#x26A0;&#xFE0F; ' + _esc(w))
                ];
                if (allMessages.length === 0) {
                    banner.style.display = 'none';
                } else {
                    banner.style.display = 'block';
                    banner.className = 'validation-banner ' + ((data.errors && data.errors.length > 0) ? 'error' : 'warning');
                    banner.innerHTML = allMessages.join('<br>');
                }
            })
            .catch(() => { /* ignore network errors silently */ });
        }


        // ─── DSL Autocompletion ──────────────────────────────────────────────────
        /* ── Component Panel ───────────────────────────────────────────────── */
        var ComponentPanel = (function() {
            var _entity = 'boundary';
            var _mode   = 'add';
            var _built  = false;

            function _ed()  { return typeof TabManager !== 'undefined' ? TabManager.getActiveEditor() : null; }
            function _val() { var e = _ed(); return e ? e.getValue() : ''; }
            function _fid(type, key) { return 'cpf-' + type + '-' + key; }

            /* Build all entity forms dynamically from DSL_SCHEMA (runs once on first open) */
            function _buildForms() {
                if (_built) return;
                _built = true;
                var area = document.getElementById('cp-form-area');
                var first = true;
                Object.keys(DSL_SCHEMA.entities).forEach(function(type) {
                    var ent = DSL_SCHEMA.entities[type];
                    var div = document.createElement('div');
                    div.className = 'cp-form';
                    div.id = 'cp-form-' + type;
                    if (!first) div.style.display = 'none';
                    first = false;
                    ent.fields.forEach(function(field) {
                        var id  = _fid(type, field.key);
                        var lbl = document.createElement('label');
                        if (field.type === 'checkbox') {
                            lbl.className = 'cp-check-row';
                            var cb = document.createElement('input');
                            cb.type = 'checkbox'; cb.id = id;
                            lbl.appendChild(cb);
                            lbl.appendChild(document.createTextNode('\u00a0' + field.label));
                        } else if (field.type === 'select' || field.type === 'boundary-select' || field.type === 'node-select') {
                            lbl.appendChild(document.createTextNode(field.label));
                            var sel = document.createElement('select');
                            sel.id = id;
                            if (field.type === 'boundary-select') {
                                var ob = document.createElement('option'); ob.value = ''; ob.textContent = '(none)'; sel.appendChild(ob);
                            } else if (field.type === 'node-select') {
                                var on = document.createElement('option'); on.value = ''; on.textContent = '(select)'; sel.appendChild(on);
                            } else {
                                (field.options || []).forEach(function(opt) {
                                    var o = document.createElement('option'); o.value = o.textContent = opt;
                                    if (opt === '') { o.textContent = '\u2014'; o.value = ''; }
                                    sel.appendChild(o);
                                });
                            }
                            lbl.appendChild(sel);
                        } else {
                            lbl.appendChild(document.createTextNode(field.label + (field.required ? ' *' : '')));
                            var inp = document.createElement('input');
                            inp.type = 'text'; inp.id = id;
                            if (field.placeholder) inp.placeholder = field.placeholder;
                            lbl.appendChild(inp);
                        }
                        div.appendChild(lbl);
                    });
                    area.appendChild(div);
                });
            }

            /* Parse entity names from active editor */
            function _parseNames(type) {
                var sec = DSL_SCHEMA.entities[type].section;
                var lines = _val().split('\n'), inSec = false, names = [];
                for (var i = 0; i < lines.length; i++) {
                    var l = lines[i];
                    if (l.trim() === sec) { inSec = true; continue; }
                    if (inSec && /^## /.test(l)) break;
                    if (inSec) { var m = l.trim().match(/^- \*\*(.+?)\*\*/); if (m) names.push(m[1]); }
                }
                return names;
            }

            /* Parse attributes of one named entity.
             * Handles both quoted values (key="val with spaces") and unquoted ones.
             * Unquoted pattern [^,\n]+ captures everything except comma/newline,
             * covering hex colors (#2c974b), parens (Backend (TRUSTED)), pipes, colons, etc. */
            function _parseAttrs(name) {
                var esc = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                var re  = new RegExp('^\\s*- \\*\\*' + esc + '\\*\\*:?(.*)$');
                var attrs = {name: name};
                for (var line of _val().split('\n')) {
                    var m = line.match(re);
                    if (!m) continue;
                    var rest = m[1], am;
                    // Alt 1: key="quoted value"  — handles spaces, commas inside value
                    // Alt 2: key=unquoted        — anything except comma or newline
                    var ap = /(\w+)="([^"]*)"|\b(\w+)=([^,\n]+?)(?=\s*,\s*\w+=|\s*$)/g;
                    while ((am = ap.exec(rest)) !== null) {
                        var k = am[1] || am[3];
                        var v = am[2] !== undefined ? am[2] : am[4].trim();
                        if (k) attrs[k] = v;
                    }
                    break;
                }
                return attrs;
            }

            /* Build DSL line from fields dict */
            function _dsl(fields) {
                var name = (fields.name || '').trim(); if (!name) return null;
                var parts = [];
                for (var k in fields) {
                    if (k === 'name') continue;
                    var v = fields[k];
                    if (v === '' || v === null || v === undefined || v === false) continue;
                    if (typeof v === 'string' && /[ ,]/.test(v)) v = '"' + v + '"';
                    parts.push(k + '=' + v);
                }
                return '- **' + name + '**: ' + parts.join(', ');
            }

            /* Read form fields — schema-driven */
            function _collect() {
                var f = {};
                DSL_SCHEMA.entities[_entity].fields.forEach(function(field) {
                    var el = document.getElementById(_fid(_entity, field.key));
                    if (!el) return;
                    if (field.type === 'checkbox') {
                        if (el.checked) f[field.key] = 'True';
                    } else {
                        f[field.key] = el.value;
                    }
                });
                return f;
            }

            /* Fill form from attrs dict — schema-driven.
             * - checkbox: explicit True/False (case-insensitive); falls back to field.default_checked
             * - other: use attr value or field.default_val */
            function _fill(attrs) {
                DSL_SCHEMA.entities[_entity].fields.forEach(function(field) {
                    var el = document.getElementById(_fid(_entity, field.key));
                    if (!el) return;
                    if (field.type === 'checkbox') {
                        var raw = attrs[field.key];
                        if (raw !== undefined) {
                            el.checked = raw.toLowerCase() === 'true';
                        } else {
                            el.checked = !!field.default_checked;
                        }
                    } else {
                        el.value = attrs[field.key] || field.default_val || '';
                    }
                });
            }

            /* Clear form — schema-driven */
            function _clearForm(keepName) {
                DSL_SCHEMA.entities[_entity].fields.forEach(function(field) {
                    if (keepName && field.key === 'name') return;
                    var el = document.getElementById(_fid(_entity, field.key));
                    if (!el) return;
                    if (field.type === 'checkbox') {
                        el.checked = !!field.default_checked;
                    } else {
                        el.value = field.default_val || '';
                    }
                });
            }

            /* Populate all boundary-select dropdowns across all entity forms */
            function _syncBoundaries() {
                var bNames = _parseNames('boundary');
                Object.keys(DSL_SCHEMA.entities).forEach(function(type) {
                    DSL_SCHEMA.entities[type].fields.forEach(function(field) {
                        if (field.type !== 'boundary-select') return;
                        var sel = document.getElementById(_fid(type, field.key)); if (!sel) return;
                        var cur = sel.value;
                        sel.innerHTML = '<option value="">(none)</option>';
                        bNames.forEach(function(n) {
                            var o = document.createElement('option'); o.value = o.textContent = n; sel.appendChild(o);
                        });
                        sel.value = cur;
                    });
                });
            }

            /* Populate all node-select dropdowns (actors + servers) */
            function _syncNodes() {
                var nodes = _parseNames('actor').concat(_parseNames('server'));
                Object.keys(DSL_SCHEMA.entities).forEach(function(type) {
                    DSL_SCHEMA.entities[type].fields.forEach(function(field) {
                        if (field.type !== 'node-select') return;
                        var sel = document.getElementById(_fid(type, field.key)); if (!sel) return;
                        var cur = sel.value;
                        sel.innerHTML = '<option value="">(select)</option>';
                        nodes.forEach(function(n) {
                            var o = document.createElement('option'); o.value = o.textContent = n; sel.appendChild(o);
                        });
                        sel.value = cur;
                    });
                });
            }

            /* Insert DSL line into the correct section of the active editor */
            function _insert(line) {
                var ed = _ed(); if (!ed) return;
                var sec = DSL_SCHEMA.entities[_entity].section;
                var all = ed.getValue().split('\n'), si = -1, ni = all.length;
                for (var i = 0; i < all.length; i++) {
                    if (all[i].trim() === sec) { si = i; continue; }
                    if (si >= 0 && /^## /.test(all[i])) { ni = i; break; }
                }
                if (si === -1) {
                    ed.setValue(ed.getValue().trimEnd() + '\n\n' + sec + '\n' + line + '\n');
                    return;
                }
                var last = si;
                for (var j = si+1; j < ni; j++) { if (/^\s*- \*\*/.test(all[j])) last = j; }
                ed.replaceRange('\n' + line, {line: last, ch: all[last].length});
            }

            /* Find entity line and replace it */
            function _update(oldName, line) {
                var ed = _ed(); if (!ed) return;
                var esc = oldName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                var re  = new RegExp('^\\s*- \\*\\*' + esc + '\\*\\*');
                var all = ed.getValue().split('\n');
                for (var i = 0; i < all.length; i++) {
                    if (re.test(all[i])) {
                        ed.replaceRange(line, {line:i,ch:0}, {line:i,ch:all[i].length});
                        return;
                    }
                }
            }

            function _refreshEditSelect() {
                var sel = document.getElementById('cp-entity-select');
                var cur = sel.value;
                sel.innerHTML = '<option value="">\u2014 select \u2014</option>';
                _parseNames(_entity).forEach(function(n) {
                    var o = document.createElement('option'); o.value = o.textContent = n; sel.appendChild(o);
                });
                sel.value = cur;
            }

            /* ── Public API ───────────────────────────────────────────────── */
            return {
                toggle: function() {
                    document.getElementById('cp-panel').classList.contains('open') ? this.close() : this.open();
                },
                open: function() {
                    _buildForms();
                    var p = document.getElementById('cp-panel');
                    p.classList.add('open'); p.setAttribute('aria-hidden','false');
                    document.getElementById('cp-tab').classList.add('open');
                    _syncBoundaries(); _syncNodes();
                },
                close: function() {
                    var p = document.getElementById('cp-panel');
                    p.classList.remove('open'); p.setAttribute('aria-hidden','true');
                    document.getElementById('cp-tab').classList.remove('open');
                },
                setEntity: function(type) {
                    _entity = type;
                    document.querySelectorAll('.cp-etab').forEach(function(b) {
                        b.classList.toggle('active', b.dataset.entity === type);
                    });
                    document.querySelectorAll('.cp-form').forEach(function(f) {
                        f.style.display = f.id === 'cp-form-' + type ? '' : 'none';
                    });
                    _syncBoundaries(); _syncNodes();
                    if (_mode === 'edit') _refreshEditSelect();
                    _clearForm();
                },
                setMode: function(mode) {
                    _mode = mode;
                    document.getElementById('cp-mode-add').classList.toggle('active', mode === 'add');
                    document.getElementById('cp-mode-edit').classList.toggle('active', mode === 'edit');
                    document.getElementById('cp-edit-select-row').style.display = mode === 'edit' ? '' : 'none';
                    document.getElementById('cp-action-btn').textContent = mode === 'add' ? 'Insert' : 'Update';
                    if (mode === 'edit') _refreshEditSelect();
                    else _clearForm();
                },
                onEntitySelect: function() {
                    var name = document.getElementById('cp-entity-select').value;
                    if (name) {
                        // Refresh dynamic selects so boundary/node options are current.
                        _syncBoundaries();
                        _syncNodes();
                        _fill(_parseAttrs(name));
                    } else {
                        _clearForm(true);
                    }
                },
                execute: function() {
                    var fields = _collect();
                    if (!fields.name || !fields.name.trim()) { alert('Name is required.'); return; }
                    var line = _dsl(fields); if (!line) return;
                    if (_mode === 'add') {
                        _insert(line);
                    } else {
                        var old = document.getElementById('cp-entity-select').value;
                        if (!old) { alert('Select an entity to update.'); return; }
                        _update(old, line);
                    }
                    var btn = document.getElementById('cp-action-btn');
                    var orig = btn.textContent;
                    btn.textContent = '\u2713 Done'; btn.style.background = '#0366d6';
                    setTimeout(function() {
                        btn.textContent = orig; btn.style.background = '';
                        if (_mode === 'add') _clearForm();
                    }, 1100);
                }
            };
        })();

        function attachDslAutocomplete(editor) {
            // All lists derived from DSL_SCHEMA — add/edit fields there, not here.
            const SECTIONS = DSL_SCHEMA.sections;

            const ATTRIBUTES = DSL_SCHEMA.attributes.map(function(a) {
                return { text: a.key + '=', detail: a.detail };
            });

            // Sets for dynamic ref-type value lookup in buildSuggestions
            const _boundaryRefKeys = new Set(
                DSL_SCHEMA.attributes.filter(function(a) { return a.valueType === 'boundary-ref'; }).map(function(a) { return a.key; })
            );
            const _nodeRefKeys = new Set(
                DSL_SCHEMA.attributes.filter(function(a) { return a.valueType === 'node-ref'; }).map(function(a) { return a.key; })
            );

            const VALUES = {};
            DSL_SCHEMA.attributes.forEach(function(a) {
                if (a.valueType === 'bool') {
                    VALUES[a.key] = DSL_SCHEMA.values.bool;
                } else if (a.valueType === 'select' && DSL_SCHEMA.values[a.key]) {
                    VALUES[a.key] = DSL_SCHEMA.values[a.key];
                }
            });

            // ── Dropdown element ────────────────────────────────────────────────
            const dropdown = document.createElement('ul');
            dropdown.setAttribute('id', 'dsl-autocomplete-' + Math.random().toString(36).slice(2));
            Object.assign(dropdown.style, {
                position: 'fixed', zIndex: '9999', margin: '0', padding: '4px 0',
                listStyle: 'none', borderRadius: '6px',
                boxShadow: '0 4px 16px rgba(0,0,0,0.18)',
                minWidth: '270px', maxHeight: '220px', overflowY: 'auto',
                fontFamily: 'monospace', fontSize: '13px', display: 'none',
                transition: 'none',
            });
            document.body.appendChild(dropdown);

            let activeIndex = -1;
            let currentSuggestions = [];

            function applyDropdownTheme() {
                const dark = document.body.classList.contains('dark-mode');
                dropdown.style.background = dark ? '#252526' : '#fff';
                dropdown.style.border     = dark ? '1px solid #555' : '1px solid #ccc';
                dropdown.style.color      = dark ? '#d4d4d4' : '#333';
            }

            function hideDropdown() {
                dropdown.style.display = 'none';
                activeIndex = -1;
                currentSuggestions = [];
            }

            // ── Parse boundary / actor / server names from content ──────────────
            function extractNames(content, sectionTitle) {
                const names = [];
                const lines = content.split('\n');
                let inSection = false;
                for (const line of lines) {
                    const sm = line.match(/^##\s+(.+)/);
                    if (sm) { inSection = sm[1].trim().toLowerCase() === sectionTitle.toLowerCase(); continue; }
                    if (inSection) {
                        const nm = line.match(/\*\*([^*]+)\*\*/);
                        if (nm) names.push(nm[1]);
                    }
                }
                return names;
            }

            // ── Determine cursor context ─────────────────────────────────────────
            function getContext(cm) {
                const cursor = cm.getCursor();
                const line   = cm.getLine(cursor.line);
                const before = line.slice(0, cursor.ch);

                // Section header: line starts with #
                if (/^#{1,2}\s*\w*$/.test(before)) {
                    const typed = before.replace(/^#+\s*/, '');
                    return { kind: 'section', typed, before };
                }

                // Value: last token is  attr=<partial>  or  attr="<partial>
                const valMatch = before.match(/(\w+)=["']?([^,\s"']*)$/);
                if (valMatch) {
                    return { kind: 'value', attr: valMatch[1], typed: valMatch[2], before };
                }

                // Attribute: on a DSL item line, typing a word
                if (/^-\s|\*\*/.test(line)) {
                    const wordMatch = before.match(/(\w*)$/);
                    return { kind: 'attribute', typed: wordMatch ? wordMatch[1] : '', before };
                }

                return null;
            }

            // ── Build suggestion list ────────────────────────────────────────────
            function buildSuggestions(ctx, cm) {
                if (!ctx) return [];
                const lc = s => s.toLowerCase();

                if (ctx.kind === 'section') {
                    return SECTIONS
                        .filter(s => lc(s).includes(lc(ctx.typed)))
                        .map(s => ({ display: s, insert: s, detail: 'section' }));
                }

                if (ctx.kind === 'value') {
                    const attr = ctx.attr;
                    if (_boundaryRefKeys.has(attr)) {
                        return extractNames(cm.getValue(), 'Boundaries')
                            .filter(n => lc(n).includes(lc(ctx.typed)))
                            .map(n => ({ display: n, insert: n, detail: 'boundary' }));
                    }
                    if (_nodeRefKeys.has(attr)) {
                        const actors  = extractNames(cm.getValue(), 'Actors');
                        const servers = extractNames(cm.getValue(), 'Servers');
                        return [...actors.map(n => ({ display: n, insert: n, detail: 'actor' })),
                                ...servers.map(n => ({ display: n, insert: n, detail: 'server' }))]
                            .filter(s => lc(s.display).includes(lc(ctx.typed)));
                    }
                    const vals = VALUES[attr];
                    if (vals) {
                        return vals
                            .filter(v => lc(v).startsWith(lc(ctx.typed)))
                            .map(v => ({ display: v, insert: v, detail: attr }));
                    }
                    return [];
                }

                if (ctx.kind === 'attribute') {
                    return ATTRIBUTES
                        .filter(a => lc(a.text).startsWith(lc(ctx.typed)))
                        .map(a => ({ display: a.text, insert: a.text.slice(ctx.typed.length), detail: a.detail }));
                }

                return [];
            }

            // ── Render & position dropdown ───────────────────────────────────────
            function renderDropdown(cm) {
                const dark = document.body.classList.contains('dark-mode');
                applyDropdownTheme();
                dropdown.innerHTML = '';
                currentSuggestions.forEach((s, i) => {
                    const li = document.createElement('li');
                    Object.assign(li.style, {
                        padding: '4px 12px', cursor: 'pointer',
                        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                        background: i === activeIndex ? (dark ? '#094771' : '#e3f2fd') : 'transparent',
                    });
                    const main = document.createElement('span');
                    main.textContent = s.display;
                    main.style.fontWeight = '600';
                    const det = document.createElement('span');
                    det.textContent = s.detail;
                    det.style.cssText = `color:${dark ? '#888' : '#aaa'};font-size:11px;margin-left:8px;`;
                    li.appendChild(main);
                    li.appendChild(det);
                    li.addEventListener('mousedown', e => { e.preventDefault(); applySuggestion(cm, s); });
                    li.addEventListener('mouseover', () => { activeIndex = i; renderDropdown(cm); });
                    dropdown.appendChild(li);
                });

                const coords = cm.cursorCoords(true, 'window');
                dropdown.style.display = 'block';
                dropdown.style.left = coords.left + 'px';
                dropdown.style.top  = (coords.bottom + 2) + 'px';

                requestAnimationFrame(() => {
                    const r = dropdown.getBoundingClientRect();
                    if (r.right  > window.innerWidth)  dropdown.style.left = Math.max(0, window.innerWidth  - r.width  - 8) + 'px';
                    if (r.bottom > window.innerHeight)  dropdown.style.top  = (coords.top - r.height - 2) + 'px';
                });
            }

            function showDropdown(cm) {
                const ctx = getContext(cm);
                const sugg = buildSuggestions(ctx, cm);
                if (sugg.length === 0) { hideDropdown(); return; }
                currentSuggestions = sugg;
                activeIndex = 0;
                renderDropdown(cm);
            }

            // ── Apply selected suggestion ────────────────────────────────────────
            function applySuggestion(cm, s) {
                const ctx = getContext(cm);
                if (!ctx) { hideDropdown(); return; }
                const cursor = cm.getCursor();
                const line   = cm.getLine(cursor.line);

                if (ctx.kind === 'section') {
                    cm.replaceRange(s.insert + '\n', { line: cursor.line, ch: 0 }, { line: cursor.line, ch: line.length });
                    cm.setCursor({ line: cursor.line + 1, ch: 0 });
                } else if (ctx.kind === 'value') {
                    const valMatch = ctx.before.match(/(\w+)=["']?([^,\s"']*)$/);
                    if (valMatch) {
                        const startCh = cursor.ch - valMatch[2].length;
                        cm.replaceRange(s.insert, { line: cursor.line, ch: startCh }, cursor);
                    }
                } else if (ctx.kind === 'attribute') {
                    cm.replaceRange(s.insert, cursor);
                }

                hideDropdown();
                cm.focus();
            }

            // ── Event hooks ─────────────────────────────────────────────────────
            const NAV_KEYS = new Set(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',
                                      'Shift','Control','Alt','Meta','CapsLock',
                                      'PageUp','PageDown','Home','End']);

            editor.on('keydown', function(cm, event) {
                // Ctrl+Space: force-show
                if (event.key === ' ' && event.ctrlKey) {
                    event.preventDefault();
                    showDropdown(cm);
                    return;
                }
                if (dropdown.style.display === 'none') return;

                if (event.key === 'ArrowDown') {
                    event.preventDefault();
                    activeIndex = Math.min(activeIndex + 1, currentSuggestions.length - 1);
                    renderDropdown(cm);
                } else if (event.key === 'ArrowUp') {
                    event.preventDefault();
                    activeIndex = Math.max(activeIndex - 1, 0);
                    renderDropdown(cm);
                } else if (event.key === 'Tab' || event.key === 'Enter') {
                    if (currentSuggestions.length > 0) {
                        event.preventDefault();
                        applySuggestion(cm, currentSuggestions[Math.max(activeIndex, 0)]);
                    }
                } else if (event.key === 'Escape') {
                    event.preventDefault();
                    hideDropdown();
                }
            });

            editor.on('keyup', function(cm, event) {
                if (NAV_KEYS.has(event.key) || event.key === 'Escape' || event.key === 'Enter') return;
                showDropdown(cm);
            });

            editor.on('blur', function() { setTimeout(hideDropdown, 150); });

            // Clean up dropdown when editor is replaced
            editor.on('destroy', function() { dropdown.remove(); });
        }
        // ── End DSL Autocompletion ────────────────────────────────────────────────

    </script>
</body>
</html>
