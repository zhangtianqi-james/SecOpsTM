    <style>

        .container {

<body>

    <div class="header">
        <h1>Threat Model Editor <span style="font-size: 0.6em;">- Main Model</span></h1>
        <div class="menu-bar">
            <div class="dropdown">
                <button class="dropbtn">📁 File</button>
                <div class="dropdown-content">
                    <button onclick="document.getElementById('loadFileInput').click()">📥 Load Model (.md)</button>
                    <input type="file" id="loadFileInput" accept=".md" style="display: none;" onchange="loadMarkdownFile(event)">
                    <button onclick="saveProjectToServer()">💾 Save Project to Server</button>
                </div>
            </div>
            <div class="menu-separator"></div>
            <div class="dropdown">
                <button class="dropbtn">Submodel</button>
                <div class="dropdown-content">
                    <button onclick="TabManager.addSubmodel()">➕ Add Sub-model</button>
                    <button onclick="TabManager.triggerLoadSubmodel()">📂 Load Sub-model</button>
                    <input type="file" id="loadSubmodelInput" accept=".md" style="display: none;" onchange="TabManager.loadSubmodel(event)">
                </div>
            </div>
            <div class="menu-separator"></div>
            <button onclick="generateAllFiles()" class="menu-button">⚡ Generate All</button>
            <div class="menu-separator"></div>
            <div class="dropdown">
                <button class="dropbtn">📤 Export</button>
                <div class="dropdown-content">
                    <button onclick="exportFile('svg')">📊 Export SVG</button>
                    <button onclick="exportFile('diagram')">🖼️ Export Diagram (HTML)</button>
                    <button onclick="exportFile('report')">📄 Export Report (HTML)</button>
                    <button onclick="exportAllFiles()">🗃️ Export All (ZIP)</button>
                    <button onclick="exportNavigatorAndStixButton()">🔍 Export ATT&CK Navigator & STIX</button>
                </div>
            </div>
            <div class="dark-mode-toggle" id="darkModeToggle">
                <div class="dark-mode-toggle-indicator"></div>
            </div>
        </div>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <div id="split-container" class="container">
        <div id="editor-split" class="editor-pane">
            <div id="drop-overlay" class="drop-overlay">Drop .md file here to load</div>
            <div class="tab-container">
                <div class="tab-bar" id="tab-bar"></div>
                <div class="tab-content-area" id="tab-content-area"></div>
            </div>
        </div>
        <div id="preview-split" class="preview-container">
            <div id="svg-container">
                <div id="svg-wrapper"></div>
                <div id="zoom-controls">
                    <button id="zoom-in-btn">+</button>
                    <button id="zoom-out-btn">-</button>
                    <button id="zoom-reset-btn">&#8635;</button>
                </div>
            </div>
            <div id="legend-container"></div>
        </div>
    </div>

    <script>
        let panZoomInstance;
        let debounceTimer;
        const svgContainer = document.getElementById('svg-container');
        const svgWrapper = document.getElementById('svg-wrapper');
        const legendContainer = document.getElementById('legend-container');
        const errorMessageDiv = document.getElementById('errorMessage');
        let protocolVisibilityState = {};

        const TabManager = {
            editors: [],
            tabCount: 0,

            init: function() {
                this.addTab('main.md', atob("{{ initial_markdown | e }}"), false);
                this.switchTab(0);
            },

            addTab: function(path, content = '', closable = true) {
                const tabIndex = this.tabCount;
                const tabBar = document.getElementById('tab-bar');
                const tabContentArea = document.getElementById('tab-content-area');

                // Create Tab Button
                const tabButton = document.createElement('button');
                tabButton.className = 'tab-button';
                tabButton.dataset.tabIndex = tabIndex;
                tabButton.innerHTML = `<span>${path}</span>`;
                if (closable) {
                    const closeButton = document.createElement('button');
                    closeButton.className = 'tab-close-button';
                    closeButton.innerHTML = '&times;';
                    closeButton.onclick = (e) => {
                        e.stopPropagation();
                        this.closeTab(tabIndex);
                    };
                    tabButton.appendChild(closeButton);
                }
                tabButton.onclick = () => this.switchTab(tabIndex);
                tabBar.appendChild(tabButton);

                // Create Tab Pane
                const tabPane = document.createElement('div');
                tabPane.className = 'tab-pane';
                tabPane.id = `tab-pane-${tabIndex}`;
                
                const textArea = document.createElement('textarea');
                tabPane.appendChild(textArea);
                tabContentArea.appendChild(tabPane);

                // Initialize CodeMirror
                const editor = CodeMirror.fromTextArea(textArea, {
                    mode: 'markdown',
                    theme: 'material',
                    lineNumbers: true,
                    lineWrapping: true,
                });
                editor.setValue(content);
                editor.on('change', () => {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(updatePreview, 500);
                });

                this.editors[tabIndex] = { editor, path, tabButton, tabPane };
                this.tabCount++;
                return tabIndex;
            },

            addSubmodel: function() {
                let suggestedPath = "submodel/model.md";
                let counter = 1;
                let pathExists = true;

                // Generate a unique suggested path
                while(pathExists) {
                    suggestedPath = `submodel/model${counter}.md`;
                    pathExists = this.editors.some(editorData => editorData && editorData.path === suggestedPath);
                    if (pathExists) {
                        counter++;
                    }
                }
                
                const path = prompt("Enter the path for the new sub-model:", suggestedPath);
                if (path) {
                    const existingTab = this.editors.find(e => e && e.path === path);
                    if (existingTab) {
                        alert(`A tab with the path "${path}" already exists.`);
                        const existingIndex = this.editors.indexOf(existingTab);
                        this.switchTab(existingIndex);
                        return;
                    }
                    
                    // Generate a default model name from the file path
                    const filename = path.split('/').pop().split('\\').pop(); // Handle both / and \ separators
                    const modelName = filename.split('.').slice(0, -1).join('.') || 'New Sub-Model';

                    const newIndex = this.addTab(path, `# Threat Model: ${modelName}\n\n`);
                    this.switchTab(newIndex);
                }
            },

            switchTab: function(tabIndex) {
                this.editors.forEach((editorData, index) => {
                    const isActive = index === tabIndex;
                    editorData.tabButton.classList.toggle('active', isActive);
                    editorData.tabPane.classList.toggle('active', isActive);
                });
                // Refresh the active editor to ensure it's rendered correctly
                if (this.editors[tabIndex]) {
                    this.editors[tabIndex].editor.refresh();
                }
                updatePreview();
            },

            closeTab: function(tabIndex) {
                if (!this.editors[tabIndex] || !confirm(`Are you sure you want to close ${this.editors[tabIndex].path}?`)) {
                    return;
                }
                const { tabButton, tabPane, editor } = this.editors[tabIndex];
                tabButton.remove();
                tabPane.remove();
                // editor.toTextArea(); // Clean up CodeMirror instance
                this.editors[tabIndex] = null;

                // Switch to main tab
                this.switchTab(0);
            },

            getActiveEditor: function() {
                const activeTab = document.querySelector('.tab-button.active');
                if (activeTab) {
                    const tabIndex = parseInt(activeTab.dataset.tabIndex, 10);
                    return this.editors[tabIndex]?.editor;
                }
                return null;
            },

            getAllData: function() {
                const mainModelContent = this.editors[0]?.editor.getValue() || '';
                const submodels = [];
                this.editors.forEach((editorData, index) => {
                    if (index > 0 && editorData) { // Skip main model
                        submodels.push({
                            path: editorData.path,
                            content: editorData.editor.getValue()
                        });
                    }
                });
                return { mainModelContent, submodels };
            },

            triggerLoadSubmodel: function() {
                document.getElementById('loadSubmodelInput').click();
            },

            loadSubmodel: function(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    const content = e.target.result;
                    const filename = file.name;
                    const path = `submodel/${filename}`; // Assuming loaded submodels also go under 'submodel/'

                    // Check if a tab with this path already exists
                    const existingTab = this.editors.find(e => e && e.path === path);
                    if (existingTab) {
                        alert(`A tab with the path "${path}" already exists. Switching to it and updating content.`);
                        const existingIndex = this.editors.indexOf(existingTab);
                        this.switchTab(existingIndex);
                        existingTab.editor.setValue(content); // Update content if re-loading
                        return;
                    }

                    // Add new tab for the loaded submodel
                    const newIndex = this.addTab(path, content);
                    this.switchTab(newIndex);
                };
                reader.readAsText(file);
            }
        };

        // Dark mode functionality
        (function() {
            const toggle = document.getElementById('darkModeToggle');
            const body = document.body;

            const applyTheme = (theme) => {
                if (theme === 'dark') body.classList.add('dark-mode');
                else body.classList.remove('dark-mode');
            };

            toggle.addEventListener('click', () => {
                const newTheme = body.classList.contains('dark-mode') ? 'light' : 'dark';
                localStorage.setItem('theme', newTheme);
                applyTheme(newTheme);
            });

            applyTheme(localStorage.getItem('theme') || 'light');
        })();

        async function updatePreview() {
            hideErrorMessage();
            const activeEditor = TabManager.getActiveEditor();
            if (!activeEditor) return;

            const markdownContent = activeEditor.getValue();
            try {
                const response = await fetch('/api/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ markdown: markdownContent }),
                });
                if (!response.ok) {
                    const errorData = await response.json();
                    showErrorMessage(`Error updating diagram: ${errorData.error}`);
                    svgWrapper.innerHTML = '';
                    legendContainer.innerHTML = '';
                    if (panZoomInstance) panZoomInstance.destroy();
                    panZoomInstance = null;
                    return;
                }
                const data = await response.json();

                if (panZoomInstance) panZoomInstance.destroy();
                svgWrapper.innerHTML = data.diagram_svg;
                legendContainer.innerHTML = data.legend_html;

                const modelNameSpan = document.querySelector('.header h1 span');
                if (modelNameSpan) modelNameSpan.textContent = `- ${data.model_name}`;

                applyProtocolVisibility();

                const svgElement = svgWrapper.querySelector('svg');
                if (svgElement) {
                    console.log("SVG element found in svgWrapper, initializing svgPanZoom on SVG element.");
                    panZoomInstance = svgPanZoom(svgElement, {
                        zoomEnabled: true,
                        panEnabled: true,
                        controlIconsEnabled: false,
                        fit: true,
                        center: true,
                        minZoom: 0.1,
                        maxZoom: 10
                    });
                    console.log("svgPanZoom initialized with instance:", panZoomInstance);
                } else {
                    console.log("SVG element not found in svgWrapper. Not initializing svgPanZoom.");
                    panZoomInstance = null;
                }
            } catch (error) {
                showErrorMessage(`Failed to fetch preview: ${error.message}`);
                svgWrapper.innerHTML = '';
                legendContainer.innerHTML = '';
                if (panZoomInstance) panZoomInstance.destroy();
                panZoomInstance = null;
            }
        }



        // Helper functions for zoom controls
        // Helper functions for zoom controls
        function zoom(factor) {
            if (panZoomInstance) {
                console.log(`Attempting to zoom by factor: ${factor}`);
                panZoomInstance.zoomBy(factor);
            } else {
                console.log("panZoomInstance is null, cannot zoom.");
            }
        }

        function zoomReset() {
            if (panZoomInstance) {
                console.log("Attempting to reset zoom.");
                panZoomInstance.reset();
            } else {
                console.log("panZoomInstance is null, cannot reset zoom.");
            }
        }

        document.getElementById('zoom-in-btn').onclick = () => zoom(1.2);
        document.getElementById('zoom-out-btn').onclick = () => zoom(0.8);
        document.getElementById('zoom-reset-btn').onclick = () => zoomReset();


        async function generateAllFiles() {
            const { mainModelContent, submodels } = TabManager.getAllData();
            try {
                const response = await fetch('/api/generate_all', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ markdown: mainModelContent, submodels: submodels }),
                });
                if (!response.ok) {
                    const errorText = await response.text();
                    try {
                        const errorData = JSON.parse(errorText);
                        alert(`Generate All failed: ${errorData.error}`);
                    } catch (e) {
                        console.error("Server returned non-JSON error response:", errorText);
                        alert("Generate All failed: The server returned an unexpected error. Check the browser's developer console for more details.");
                    }
                    return;
                }
                const result = await response.json();
                if (result.success) {
                    alert(`Success! All files generated in: ${result.generation_dir}`);
                } else {
                    alert(`Generate All failed: ${result.error || 'Unknown error'}`);
                }
            } catch (error) {
                console.error('Generate All error:', error);
                alert('An error occurred during generation.');
            }
        }

        function showErrorMessage(message) {
            errorMessageDiv.textContent = message;
            errorMessageDiv.style.display = 'block';
        }

        function hideErrorMessage() {
            errorMessageDiv.style.display = 'none';
        }

        // Add event listener for legend item clicks using event delegation
        legendContainer.addEventListener('click', (event) => {
            const legendItem = event.target.closest('.legend-item');
            if (legendItem) {
                const protocolClass = legendItem.dataset.protocol;
                if (protocolClass) {
                    toggleProtocolVisibility(protocolClass);
                }
            }
        });

        function toggleProtocolVisibility(protocolClass) {
            // Update the state
            if (protocolVisibilityState[protocolClass] === 'hidden') {
                protocolVisibilityState[protocolClass] = 'visible';
            } else {
                protocolVisibilityState[protocolClass] = 'hidden';
            }
             console.log(`Toggling ${protocolClass} to ${protocolVisibilityState[protocolClass]}`);
            // Apply the new state
            applyProtocolVisibility();
        }

        // Function to apply the current visibility state to SVG elements
        function applyProtocolVisibility() {
            const svg = svgWrapper.querySelector('svg');
            if (!svg) return;

            for (const protocolClass in protocolVisibilityState) {
                const elements = svg.querySelectorAll(`.${protocolClass}`);
                const isHidden = protocolVisibilityState[protocolClass] === 'hidden';
                
                console.log(`Applying state for ${protocolClass}: ${isHidden ? 'hidden' : 'visible'}. Found ${elements.length} elements.`);

                elements.forEach(el => {
                    if (isHidden) {
                        el.classList.add('svg-element-hidden');
                    } else {
                        el.classList.remove('svg-element-hidden');
                    }
                });
            }
        }
        
        Split(['#editor-split', '#preview-split'], {
            sizes: [50, 50],
            minSize: 200,
            gutterSize: 10,
            cursor: 'col-resize'
        });

        // Initialize Tabs
        TabManager.init();
        
        // Other functions (saveProjectToServer, exportFile, etc.) would need to be updated
        // to use the active editor's content or all tabs' content as appropriate.
        // For simplicity, they are left as they were, operating on the active editor.
        
        async function saveProjectToServer() {
            const activeEditor = TabManager.getActiveEditor();
            if (!activeEditor) return;
            const markdownContent = activeEditor.getValue();
            // This function would ideally save the entire project (all tabs)
            alert("Save Project functionality needs to be updated for multi-tab support.");
        }

        async function exportFile(format) {
            const activeEditor = TabManager.getActiveEditor();
            if (!activeEditor) return;
            const markdownContent = activeEditor.getValue();
            // This function could be interpreted as exporting the active file
            // or the entire project. For now, it exports the active file.
            try {
                const response = await fetch('/api/export', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ markdown: markdownContent, format: format }),
                });
                if (!response.ok) throw new Error((await response.json()).error);
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = response.headers.get('Content-Disposition')?.split('filename=')[1] || `export.${format}`;
                a.click();
                URL.revokeObjectURL(url);
                a.remove();
            } catch (error) {
                alert(`Export failed: ${error.message}`);
            }
        }

        async function exportAllFiles() {
            const { mainModelContent, submodels } = TabManager.getAllData();
            // Use the generate_all endpoint which now handles projects
            try {
                const response = await fetch('/api/export_all', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ markdown: mainModelContent, submodels: submodels }),
                });
                if (!response.ok) throw new Error((await response.json()).error);
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = response.headers.get('Content-Disposition')?.split('filename=')[1] || 'threat_model_export.zip';
                a.click();
                URL.revokeObjectURL(url);
                a.remove();
            } catch (error) {
                alert(`Export All (ZIP) failed: ${error.message}`);
            }
        }

        async function exportNavigatorAndStixButton() {
            const { mainModelContent, submodels } = TabManager.getAllData();
            // This needs a dedicated project-aware backend endpoint.
            // For now, let's use the export_all logic.
            alert("Export Navigator & STIX for multi-tab projects is not fully implemented yet. Exporting as ZIP.");
            await exportAllFiles();
        }

        function loadMarkdownFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const activeEditor = TabManager.getActiveEditor();
                if (activeEditor) {
                    activeEditor.setValue(e.target.result);
                }
            };
            reader.readAsText(file);
        }

        // --- Drag and Drop functionality ---
        const editorSplit = document.getElementById('editor-split');
        const dropOverlay = document.getElementById('drop-overlay');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            editorSplit.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        ['dragenter', 'dragover'].forEach(eventName => {
            editorSplit.addEventListener(eventName, () => dropOverlay.classList.add('drag-over'), false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            editorSplit.addEventListener(eventName, () => dropOverlay.classList.remove('drag-over'), false);
        });
        editorSplit.addEventListener('drop', (e) => {
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.md')) {
                const reader = new FileReader();
                reader.onload = (event) => TabManager.getActiveEditor()?.setValue(event.target.result);
                reader.readAsText(file);
            } else {
                showErrorMessage('Only .md files are supported for drag and drop.');
            }
        }, false);
    </script>
