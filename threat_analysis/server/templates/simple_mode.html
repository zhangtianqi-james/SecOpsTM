        .svg-element-hidden {
            display: none !important;
        }
        /* New styles for highlighting */
        .highlighted { /* Group-level styling for related elements */
            opacity: 1 !important;
        }
        /* Style ONLY the shapes of related elements */
        .highlighted path, .highlighted polygon, .highlighted ellipse {
            stroke: #007bff !important; /* Bright blue */
            stroke-width: 3px !important;
            transition: stroke 0.2s, stroke-width 0.2s;
        }
        /* More specific rule for EDGES to ensure they are highlighted */
        g.edge.highlighted path, g.edge.highlighted polygon {
            stroke: #007bff !important;
            stroke-width: 4px !important;
        }

        /* Ensure text within related elements remains readable */
        .highlighted text {
            stroke: none !important;
            fill: inherit !important;
        }

        .selected { /* Group-level styling for selected element */
            opacity: 1 !important;
        }
        /* Style ONLY the shapes of the selected element */
        .selected path, .selected polygon, .selected ellipse {
            stroke: red !important;
            stroke-width: 3px !important;
            fill: rgba(255, 0, 0, 0.15) !important; /* A more subtle fill */
            transition: stroke 0.2s, stroke-width 0.2s, fill 0.2s;
        }
        /* More specific rule for EDGES to ensure they are highlighted */
        g.edge.selected path, g.edge.selected polygon {
            stroke: red !important;
            stroke-width: 4px !important;
        }
        
        /* Ensure text within the selected element remains perfectly readable */
        .selected text {
            stroke: none !important;
            fill: inherit !important; /* Inherit original text color */
        }
        
        .faded {
            opacity: 0.5 !important;
            transition: opacity 0.2s ease-in-out;
        }
        /* Specific rules for text within faded elements to remain visible */
        .faded text {
            fill: inherit !important; /* Keep original text color */
            opacity: 1 !important;   /* Keep text opaque */
        }
        /* Remove graph-element's conflicting styles - let Graphviz set defaults, then override with !important */
        .graph-element {
            /* No conflicting fill/stroke here */
        }

<body>

    <script>
        let panZoomInstance;
        let debounceTimer;
        const svgContainer = document.getElementById('svg-container');
        const svgWrapper = document.getElementById('svg-wrapper');
        const legendContainer = document.getElementById('legend-container');
        const errorMessageDiv = document.getElementById('errorMessage');
        let protocolVisibilityState = {};
        
        // Global variables for graph interaction
        let globalGraphMetadata = null;
        let currentlySelectedElementId = null;

        // Function to apply highlighting
        function highlightElement(elementId) {
            // If the clicked element is already selected, clear highlighting and return.
            if (currentlySelectedElementId === elementId) {
                clearHighlighting();
                return;
            }

            // Clear previous highlighting
            clearHighlighting();
            currentlySelectedElementId = elementId;

            const svg = svgWrapper.querySelector('svg');
            if (!svg || !globalGraphMetadata) {
                return;
            }

            // Target element can be a node or an edge
            const targetElement = globalGraphMetadata.nodes[elementId] || globalGraphMetadata.edges[elementId];
            if (!targetElement) {
                return;
            }

            // Get all visible SVG groups (nodes and edges)
            const allSvgGroups = svg.querySelectorAll('g[id]');

            // Apply faded class to all elements first
            allSvgGroups.forEach(g => g.classList.add('faded'));

            // Highlight the selected element
            const selectedSvgElement = svg.querySelector(`g[id="${CSS.escape(elementId)}"]`);
            if (selectedSvgElement) {
                selectedSvgElement.classList.add('selected');
                selectedSvgElement.classList.remove('faded');
            }

            // Highlight connected elements
            const connectedElements = new Set();
            const connectedEdges = new Set();

            if (globalGraphMetadata.nodes[elementId]) { // If a node was clicked
                globalGraphMetadata.nodes[elementId].connections.forEach(edgeId => {
                    connectedEdges.add(edgeId);
                    const edge = globalGraphMetadata.edges[edgeId];
                    if (edge) {
                        connectedElements.add(edge.source);
                        connectedElements.add(edge.target);
                    }
                });
            } else if (globalGraphMetadata.edges[elementId]) { // If an edge was clicked
                const edge = globalGraphMetadata.edges[elementId];
                if (edge) {
                    connectedElements.add(edge.source);
                    connectedElements.add(edge.target);
                    connectedEdges.add(elementId);
                }
            }

            connectedElements.forEach(connId => {
                // Special handling for boundary clusters (g[id^="cluster_"])
                if (connId.startsWith('__hidden_node_')) {
                    const originalBoundaryId = connId.replace('__hidden_node_', '');
                    const boundaryCluster = svg.querySelector(`g[id="cluster_${CSS.escape(originalBoundaryId)}"]`);
                     if (boundaryCluster) {
                        boundaryCluster.classList.add('highlighted');
                        boundaryCluster.classList.remove('faded');
                    }
                }

                const connSvgElementActual = svg.querySelector(`g[id="${CSS.escape(connId)}"]`);
                if (connSvgElementActual) {
                    connSvgElementActual.classList.add('highlighted');
                    connSvgElementActual.classList.remove('faded');
                }
            });

            connectedEdges.forEach(edgeId => {
                const edgeSvgElement = svg.querySelector(`g[id="${CSS.escape(edgeId)}"]`);
                if (edgeSvgElement) {
                    edgeSvgElement.classList.add('highlighted');
                    edgeSvgElement.classList.remove('faded');
                }
            });
        }

        // Function to clear all highlighting
        function clearHighlighting() {
            const svg = svgWrapper.querySelector('svg');
            if (!svg) return;

            const allSvgGroups = svg.querySelectorAll('g[id]');
            allSvgGroups.forEach(g => {
                g.classList.remove('selected', 'highlighted', 'faded');
            });
            currentlySelectedElementId = null;
        }

        const TabManager = {
            editors: [],
            tabCount: 0,

            init: function() {
                const models = JSON.parse(atob("{{ initial_models | e }}"));
                if (models.length > 0) {
                    models.forEach((model, index) => {
                        this.addTab(model.path, model.content, index !== 0);
                    });
                    this.switchTab(0);
                } else {
                    this.addTab('main.md', '', false);
                    this.switchTab(0);
                }
            },

            addTab: function(path, content = '', closable = true) {
                const tabIndex = this.tabCount;
                const tabBar = document.getElementById('tab-bar');
                const tabContentArea = document.getElementById('tab-content-area');

                // Create Tab Button
                const tabButton = document.createElement('button');
                tabButton.className = 'tab-button';
                tabButton.dataset.tabIndex = tabIndex;
                tabButton.innerHTML = `<span>${path}</span>`;
                if (closable) {
                    const closeButton = document.createElement('button');
                    closeButton.className = 'tab-close-button';
                    closeButton.innerHTML = '&times;';
                    closeButton.onclick = (e) => {
                        e.stopPropagation();
                        this.closeTab(tabIndex);
                    };
                    tabButton.appendChild(closeButton);
                }
                tabButton.onclick = () => this.switchTab(tabIndex);
                tabBar.appendChild(tabButton);

                // Create Tab Pane
                const tabPane = document.createElement('div');
                tabPane.className = 'tab-pane';
                tabPane.id = `tab-pane-${tabIndex}`;
                
                const textArea = document.createElement('textarea');
                tabPane.appendChild(textArea);
                tabContentArea.appendChild(tabPane);

                // Initialize CodeMirror
                const editor = CodeMirror.fromTextArea(textArea, {
                    mode: 'markdown',
                    theme: 'material',
                    lineNumbers: true,
                    lineWrapping: true,
                });
                editor.setValue(content);
                editor.on('change', () => {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(updatePreview, 500);
                });

                this.editors[tabIndex] = { editor, path, tabButton, tabPane };
                this.tabCount++;
                return tabIndex;
            },

            addSubmodel: function() {
                let suggestedPath = "submodel/model.md";
                let counter = 1;
                let pathExists = true;

                // Generate a unique suggested path
                while(pathExists) {
                    suggestedPath = `submodel/model${counter}.md`;
                    pathExists = this.editors.some(editorData => editorData && editorData.path === suggestedPath);
                    if (pathExists) {
                        counter++;
                    }
                }
                
                const path = prompt("Enter the path for the new sub-model:", suggestedPath);
                if (path) {
                    const existingTab = this.editors.find(e => e && e.path === path);
                    if (existingTab) {
                        alert(`A tab with the path "${path}" already exists.`);
                        const existingIndex = this.editors.indexOf(existingTab);
                        this.switchTab(existingIndex);
                        return;
                    }
                    
                    // Generate a default model name from the file path
                    const filename = path.split('/').pop().split('\\').pop(); // Handle both / and \ separators
                    const modelName = filename.split('.').slice(0, -1).join('.') || 'New Sub-Model';

                    const newIndex = this.addTab(path, `# Threat Model: ${modelName}\n\n`);
                    this.switchTab(newIndex);
                }
            },

            switchTab: function(tabIndex) {
                this.editors.forEach((editorData, index) => {
                    const isActive = index === tabIndex;
                    editorData.tabButton.classList.toggle('active', isActive);
                    editorData.tabPane.classList.toggle('active', isActive);
                });
                // Refresh the active editor to ensure it's rendered correctly
                if (this.editors[tabIndex]) {
                    this.editors[tabIndex].editor.refresh();
                }
                updatePreview();
            },

            closeTab: function(tabIndex, force = false) {
                if (!this.editors[tabIndex] || (!force && !confirm(`Are you sure you want to close ${this.editors[tabIndex].path}?`))) {
                    return;
                }
                const { tabButton, tabPane } = this.editors[tabIndex];
                tabButton.remove();
                tabPane.remove();
                this.editors[tabIndex] = null;

                const remainingEditor = this.editors.find(e => e !== null);
                if (remainingEditor) {
                    this.switchTab(this.editors.indexOf(remainingEditor));
                } else {
                    // All tabs have been closed, properly reset the state
                    this.tabCount = 0; // Reset counter
                    this.editors = []; // Clear array
                    this.addTab('main.md', `# Threat Model: New Model`, false);
                    this.switchTab(0);
                    // Explicitly clear the preview as no valid model is active
                    svgWrapper.innerHTML = '';
                    legendContainer.innerHTML = '';
                    if (panZoomInstance) panZoomInstance.destroy();
                    panZoomInstance = null;
                    globalGraphMetadata = null;
                }
            },

           clearAllTabs: function() {
               if (confirm('Are you sure you want to close all tabs and clear the editor?')) {
                   // Remove all tab buttons and panes from the DOM
                   const tabBar = document.getElementById('tab-bar');
                   const tabContentArea = document.getElementById('tab-content-area');
                   tabBar.innerHTML = '';
                   tabContentArea.innerHTML = '';

                   // Clear the editors array and reset tab count
                   this.editors = [];
                   this.tabCount = 0;

                   // Add a single, new, empty tab
                   this.addTab('main.md', '', false);
                   this.switchTab(0);

                   // Clear the preview pane
                   document.getElementById('svg-wrapper').innerHTML = '';
                   document.getElementById('legend-container').innerHTML = '';
                   if (panZoomInstance) {
                       panZoomInstance.destroy();
                       panZoomInstance = null;
                   }
                   globalGraphMetadata = null;
               }
           },

            getActiveEditor: function() {
                const activeTab = document.querySelector('.tab-button.active');
                if (activeTab) {
                    const tabIndex = parseInt(activeTab.dataset.tabIndex, 10);
                    return this.editors[tabIndex]?.editor;
                }
                return null;
            },

            getAllData: function() {
                const activeEditor = this.getActiveEditor();
                if (!activeEditor) {
                    return { mainModelContent: '', submodels: [] };
                }
                const mainModelContent = activeEditor.getValue();
                const submodels = [];
                // This logic might need adjustment depending on how submodels are identified.
                // For now, we'll consider all *other* tabs as potential submodels.
                this.editors.forEach((editorData, index) => {
                    if (editorData && editorData.editor !== activeEditor) {
                        submodels.push({
                            path: editorData.path,
                            content: editorData.editor.getValue()
                        });
                    }
                });
                return { mainModelContent, submodels };
            },

            triggerLoadSubmodel: function() {
                document.getElementById('loadSubmodelInput').click();
            },

            loadSubmodel: function(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    const content = e.target.result;
                    const filename = file.name;
                    const path = `submodel/${filename}`; // Assuming loaded submodels also go under 'submodel/'

                    // Check if a tab with this path already exists
                    const existingTab = this.editors.find(e => e && e.path === path);
                    if (existingTab) {
                        alert(`A tab with the path "${path}" already exists. Switching to it and updating content.`);
                        const existingIndex = this.editors.indexOf(existingTab);
                        this.switchTab(existingIndex);
                        existingTab.editor.setValue(content); // Update content if re-loading
                        return;
                    }

                    // Add new tab for the loaded submodel
                    const newIndex = this.addTab(path, content);
                    this.switchTab(newIndex);
                };
                reader.readAsText(file);
            },

            loadProject: async function() {
                try {
                    // Use the File System Access API to open a directory
                    const dirHandle = await window.showDirectoryPicker();
                    const models = [];

                    // Recursively read files from the selected directory
                    async function processDirectory(directoryHandle) {
                        for await (const entry of directoryHandle.values()) {
                            if (entry.kind === 'file' && (entry.name.endsWith('.md'))) {
                                const file = await entry.getFile();
                                const content = await file.text();
                                // Create a relative path from the project root
                                const rootPath = dirHandle.name;
                                let relativePath = file.name; // Fallback
                                try {
                                    // This is a bit of a trick to get a relative path, might not be perfect
                                    const fullPathParts = await dirHandle.resolve(entry);
                                    if (fullPathParts) {
                                       relativePath = fullPathParts.join('/');
                                    }
                                } catch(e) { console.warn("Could not resolve file path, using name as fallback.", e); }
                                
                                models.push({
                                    path: relativePath,
                                    content: content
                                });
                            } else if (entry.kind === 'directory') {
                                await processDirectory(entry);
                            }
                        }
                    }

                    await processDirectory(dirHandle);

                    if (models.length === 0) {
                        alert('No markdown files (.md) found in the selected directory or its subdirectories.');
                        return;
                    }

                    // Clear existing tabs
                    this.editors.forEach((editorData, index) => {
                        if (editorData) {
                            editorData.tabButton.remove();
                            editorData.tabPane.remove();
                            this.editors[index] = null;
                        }
                    });
                    this.editors = []; // Reset the array
                    this.tabCount = 0;
                    document.getElementById('tab-bar').innerHTML = '';
                    document.getElementById('tab-content-area').innerHTML = '';


                    // Add new tabs for the loaded project
                    models.forEach((model, index) => {
                        this.addTab(model.path, model.content, index !== 0 || models.length > 1);
                    });
                    
                    if (models.length > 0) {
                        this.switchTab(0); // Switch to the first tab
                    }

                    alert('Project loaded successfully!');

                } catch (error) {
                    // Handle cases where the user cancels the dialog or API is not supported
                    if (error.name === 'AbortError') {
                        console.log('User cancelled the directory selection.');
                    } else {
                        console.error('Error loading project:', error);
                        alert(`Failed to load project: ${error.message}\n\nNote: This feature requires a modern browser that supports the File System Access API.`);
                    }
                }
            },
        };

        // Dark mode functionality
        (function() {
            const toggle = document.getElementById('darkModeToggle');
            const body = document.body;

            const applyTheme = (theme) => {
                if (theme === 'dark') body.classList.add('dark-mode');
                else body.classList.remove('dark-mode');
            };

            toggle.addEventListener('click', () => {
                const newTheme = body.classList.contains('dark-mode') ? 'light' : 'dark';
                localStorage.setItem('theme', newTheme);
                applyTheme(newTheme);
            });

            applyTheme(localStorage.getItem('theme') || 'light');
        })();

        async function updatePreview() {
            hideErrorMessage();
            const activeEditor = TabManager.getActiveEditor();
            if (!activeEditor) return;

            const markdownContent = activeEditor.getValue();
            try {
                const { mainModelContent, submodels } = TabManager.getAllData();
                const response = await fetch('/api/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ markdown: mainModelContent, submodels: submodels }),
                });
                if (!response.ok) {
                    const errorData = await response.json();
                    showErrorMessage(`Error updating diagram: ${errorData.error}`);
                    svgWrapper.innerHTML = '';
                    legendContainer.innerHTML = '';
                    if (panZoomInstance) panZoomInstance.destroy();
                    panZoomInstance = null;
                    globalGraphMetadata = null; // Clear metadata on error
                    return;
                }
                const data = await response.json();

                if (panZoomInstance) panZoomInstance.destroy();
                svgWrapper.innerHTML = data.diagram_svg;
                legendContainer.innerHTML = data.legend_html;
                globalGraphMetadata = data.graph_metadata; // Store graph metadata

                const modelNameSpan = document.querySelector('.header h1 span');
                if (modelNameSpan) modelNameSpan.textContent = `- ${data.model_name}`;

                applyProtocolVisibility();

                const svgElement = svgWrapper.querySelector('svg');
                if (svgElement) {
                    console.log("SVG element found in svgWrapper, initializing svgPanZoom on SVG element.");
                    panZoomInstance = svgPanZoom(svgElement, {
                        zoomEnabled: true,
                        panEnabled: true,
                        controlIconsEnabled: false,
                        fit: true,
                        center: true,
                        minZoom: 0.1,
                        maxZoom: 10
                    });
                    console.log("svgPanZoom initialized with instance:", panZoomInstance);

                    // Add a single click listener to the SVG container for event delegation
                    svgElement.addEventListener('click', (e) => {
                        // Find the closest parent group that is a graph element
                        const g = e.target.closest('.graph-element');

                        if (g) {
                            // A graph element (node or edge) was clicked
                            e.stopPropagation(); // Stop event from propagating further, just in case
                            highlightElement(g.id);
                        } else {
                            // The background was clicked, clear any highlighting
                            clearHighlighting();
                        }
                    });

                    // Add graph-element class to all groups with an ID for easy identification by the listener
                    const allSvgGroups = svgElement.querySelectorAll('g[id]');
                    allSvgGroups.forEach(g => {
                        g.classList.add('graph-element');
                    });

                } else {
                    console.log("SVG element not found in svgWrapper. Not initializing svgPanZoom.");
                    panZoomInstance = null;
                    globalGraphMetadata = null; // Clear metadata if SVG is missing
                }
            } catch (error) {
                showErrorMessage(`Failed to fetch preview: ${error.message}`);
                svgWrapper.innerHTML = '';
                legendContainer.innerHTML = '';
                if (panZoomInstance) panZoomInstance.destroy();
                panZoomInstance = null;
                globalGraphMetadata = null; // Clear metadata on error
            }
        }

        async function generateAllFiles() {
            const { mainModelContent, submodels: openSubmodels } = TabManager.getAllData();
            let allFiles = TabManager.editors.filter(e => e !== null).map(e => ({
                path: e.path,
                content: e.editor.getValue()
            }));

            function resolvePath(base, relative) {
                const stack = base.split('/');
                stack.pop(); // remove filename
                const parts = relative.split('/');
                for (let i = 0; i < parts.length; i++) {
                    if (parts[i] === '.') continue;
                    if (parts[i] === '..') {
                        if (stack.length > 0) stack.pop();
                    } else {
                        stack.push(parts[i]);
                    }
                }
                return stack.join('/');
            }

            let hasPotentialUnresolved = false;
            const openPaths = new Set(allFiles.map(f => f.path));
            const subModelRegex = /sub_model_path\s*=\s*"(.*?)"/g;

            for (const fileData of allFiles) {
                let match;
                while ((match = subModelRegex.exec(fileData.content)) !== null) {
                    const referencedPath = match[1];
                    try {
                        const resolvedPath = resolvePath(fileData.path, referencedPath);
                        if (!openPaths.has(resolvedPath)) {
                            hasPotentialUnresolved = true;
                            break;
                        }
                    } catch (e) {
                        console.error("Path resolution error:", e);
                        hasPotentialUnresolved = true;
                        break;
                    }
                }
                if (hasPotentialUnresolved) break;
            }

            if (hasPotentialUnresolved) {
                if (confirm("This model appears to reference sub-models that are not open. To ensure a complete generation, please select the project's root directory.")) {
                    try {
                        const dirHandle = await window.showDirectoryPicker();
                        const inMemoryFiles = [];
                        
                        async function processDirectory(directoryHandle, currentRelativePath) {
                            for await (const entry of directoryHandle.values()) {
                                const newRelativePath = currentRelativePath ? `${currentRelativePath}/${entry.name}` : entry.name;
                                if (entry.kind === 'file' && entry.name.endsWith('.md')) {
                                    const file = await entry.getFile();
                                    const content = await file.text();
                                    inMemoryFiles.push({ path: newRelativePath, content: content });
                                } else if (entry.kind === 'directory') {
                                    await processDirectory(entry, newRelativePath);
                                }
                            }
                        }
                        
                        await processDirectory(dirHandle, '');

                        const tabFilePaths = new Set(allFiles.map(f => f.path));
                        inMemoryFiles.forEach(memFile => {
                            if (!tabFilePaths.has(memFile.path)) {
                                allFiles.push(memFile);
                            }
                        });

                    } catch (error) {
                        if (error.name === 'AbortError') {
                            alert("Directory selection cancelled. Proceeding with open tabs only.");
                        } else {
                            alert(`Error accessing directory: ${error.message}. Aborting generation.`);
                            return;
                        }
                    }
                }
            }

           try {
               // Ensure `allFiles` contains all models (active tab, other tabs, and picked files).
               // The main model (active tab content) is sent as 'markdown'.
               // All other models are sent as 'submodels'.
               const activeEditorPath = TabManager.getActiveEditor().path;
               const finalSubmodels = allFiles.filter(fileData => fileData.path !== activeEditorPath);

               // Step 1: Resolve all sub-models recursively from the full set of project files
               const resolveResponse = await fetch('/api/resolve_submodels', {
                   method: 'POST',
                   headers: { 'Content-Type': 'application/json' },
                   body: JSON.stringify({
                       main_model_content: mainModelContent,
                       project_files: allFiles // Send all collected files for resolution
                   })
               });

               if (!resolveResponse.ok) {
                   const errorData = await resolveResponse.json();
                   throw new Error(`Sub-model resolution failed: ${errorData.error}`);
               }
               // We don't need resolvedData from here to filter finalSubmodels, as finalSubmodels already contains them.
               // The important part is that the server's resolution logic is run with all context.

               const generateResponse = await fetch('/api/generate_all', {
                   method: 'POST',
                   headers: { 'Content-Type': 'application/json' },
                   body: JSON.stringify({
                       markdown: mainModelContent, // Content of the active editor
                       submodels: finalSubmodels  // All other collected models
                   }),
               });

               if (!generateResponse.ok) {
                   const errorText = await generateResponse.text();
                   try {
                       const errorData = JSON.parse(errorText);
                       alert(`Generate All failed: ${errorData.error}`);
                   } catch (e) {
                       console.error("Server returned non-JSON error response:", errorText);
                       alert("Generate All failed: The server returned an unexpected error.");
                   }
                   return;
               }

               const result = await generateResponse.json();
               if (result.success) {
                   alert(`Success! All files generated in: ${result.generation_dir}`);
               } else {
                   alert(`Generate All failed: ${result.error || 'Unknown error'}`);
               }

           } catch (error) {
               console.error('Generate All process error:', error);
               alert(`An error occurred during the generation process: ${error.message}`);
           }
        }

        function showErrorMessage(message) {
            errorMessageDiv.textContent = message;
            errorMessageDiv.style.display = 'block';
        }

        function hideErrorMessage() {
            errorMessageDiv.style.display = 'none';
        }

        // Add event listener for legend item clicks using event delegation
        legendContainer.addEventListener('click', (event) => {
            const legendItem = event.target.closest('.legend-item');
            if (legendItem) {
                const protocolClass = legendItem.dataset.protocol;
                if (protocolClass) {
                    toggleProtocolVisibility(protocolClass);
                }
            }
        });

        function toggleProtocolVisibility(protocolClass) {
            const legendItem = document.querySelector(`.legend-item[data-protocol="${protocolClass}"]`);
            // Update the state
            if (protocolVisibilityState[protocolClass] === 'hidden') {
                protocolVisibilityState[protocolClass] = 'visible';
                if(legendItem) legendItem.style.opacity = 1;
            } else {
                protocolVisibilityState[protocolClass] = 'hidden';
                if(legendItem) legendItem.style.opacity = 0.5;
            }
             console.log(`Toggling ${protocolClass} to ${protocolVisibilityState[protocolClass]}`);
            // Apply the new state
            applyProtocolVisibility();
        }

        // Function to apply the current visibility state to SVG elements
        function applyProtocolVisibility() {
            const svg = svgWrapper.querySelector('svg');
            if (!svg) return;

            // First, make all elements visible
            const allElements = svg.querySelectorAll('g');
            allElements.forEach(el => el.classList.remove('svg-element-hidden'));

            // Then, hide the ones that should be hidden
            for (const protocolClass in protocolVisibilityState) {
                if (protocolVisibilityState[protocolClass] === 'hidden') {
                    // Try different ways Graphviz might have applied the class
                    const elementsToHide = svg.querySelectorAll(`g[class*="protocol-${protocolClass}"], .protocol-${protocolClass}`);
                    elementsToHide.forEach(el => {
                        el.classList.add('svg-element-hidden');
                    });
                }
            }
        }

        async function exportFile(format) {
            const { mainModelContent, submodels } = TabManager.getAllData();
            // This function could be interpreted as exporting the active file
            // or the entire project. For now, it exports the active file.
            try {
                const response = await fetch('/api/export', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ markdown: mainModelContent, submodels: submodels, format: format }),
                });
                if (!response.ok) throw new Error((await response.json()).error);
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = response.headers.get('Content-Disposition')?.split('filename=')[1] || `export.${format}`;
                a.click();
                URL.revokeObjectURL(url);
                a.remove();
            } catch (error) {
                alert(`Export failed: ${error.message}`);
            }
        }

        // --- Drag and Drop functionality ---
        const editorSplit = document.getElementById('editor-split');
        const dropOverlay = document.getElementById('drop-overlay');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            editorSplit.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        ['dragenter', 'dragover'].forEach(eventName => {
            editorSplit.addEventListener(eventName, () => dropOverlay.classList.add('drag-over'), false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            editorSplit.addEventListener(eventName, () => dropOverlay.classList.remove('drag-over'), false);
        });
        editorSplit.addEventListener('drop', (e) => {
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.md')) {
                const reader = new FileReader();
                reader.onload = (event) => TabManager.getActiveEditor()?.setValue(event.target.result);

            } else {

            }
