    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
        }
        .diagram-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .svg-container {
            width: 98%;
            height: 98%;
            border: 1px solid #ddd;
            background-color: white;
        }
        .svg-container svg {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .navigation-ui {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }
        .back-button, .legend-toggle-btn {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 8px 12px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-decoration: none;
            color: #333;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .legend-toggle-btn svg {
            width: 20px;
            height: 20px;
        }
        .zoom-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 5px;
        }
        .zoom-btn {
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .legend {
            position: absolute;
            top: 70px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #ddd;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            max-width: 200px;
            z-index: 1000;
        }
        .legend.hidden {
            display: none;
        }
        .legend-header {
            padding: 8px;
            font-weight: bold;
            border-bottom: 1px solid #eee;
        }
        .legend-content {
            padding: 8px;
        }
        .breadcrumb {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: #666;
            z-index: 1001;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 3px;
            padding: 1px 0;
            cursor: pointer;
            border-radius: 2px;
        }
        .legend-item:hover {
            background-color: rgba(0, 122, 204, 0.1);
        }
        .svg-element-hidden {
            display: none !important;
        }
        /* --- Hover effect styles --- */
        g > a > polygon,
        g > a > rect,
        g > a > ellipse,
        g > a > circle,
        g > a > path {
            transition: stroke-width 0.2s ease-in-out;
        }

        g.hover-effect {
            transition: transform 0.2s ease-in-out, filter 0.2s ease-in-out;
            transform-origin: center; /* Fallback */
        }

        g.hover-effect.hovered {
            transform: scale(1.05);
            filter: drop-shadow(3px 5px 2px rgb(0 0 0 / 0.4)) brightness(1.1);
        }

        g.hover-effect.hovered > a > polygon,
        g.hover-effect.hovered > a > rect,
        g.hover-effect.hovered > a > ellipse,
        g.hover-effect.hovered > a > circle,
        g.hover-effect.hovered > a > path {
            stroke-width: 3px !important;
        }

        /* New styles for highlighting */
        .highlighted { /* Group-level styling for related elements */
            opacity: 1 !important;
        }
        /* Style ONLY the shapes of related elements */
        .highlighted path, .highlighted polygon, .highlighted ellipse {
            stroke: #007bff !important; /* Bright blue */
            stroke-width: 3px !important;
            transition: stroke 0.2s, stroke-width 0.2s;
        }
        /* More specific rule for EDGES to ensure they are highlighted */
        g.edge.highlighted path, g.edge.highlighted polygon {
            stroke: #007bff !important;
            stroke-width: 4px !important;
        }

        /* Ensure text within related elements remains readable */
        .highlighted text {
            stroke: none !important;
            fill: inherit !important;
        }

        .selected { /* Group-level styling for selected element */
            opacity: 1 !important;
        }
        /* Style ONLY the shapes of the selected element */
        .selected path, .selected polygon, .selected ellipse {
            stroke: red !important;
            stroke-width: 3px !important;
            fill: rgba(255, 0, 0, 0.15) !important; /* A more subtle fill */
            transition: stroke 0.2s, stroke-width 0.2s, fill 0.2s;
        }
        /* More specific rule for EDGES to ensure they are highlighted */
        g.edge.selected path, g.edge.selected polygon {
            stroke: red !important;
            stroke-width: 4px !important;
        }
        
        /* Ensure text within the selected element remains perfectly readable */
        .selected text {
            stroke: none !important;
            fill: inherit !important; /* Inherit original text color */
        }
        
        .faded {
            opacity: 0.5 !important;
            transition: opacity 0.2s ease-in-out;
        }
        /* Specific rules for text within faded elements to remain visible */
        .faded text {
            fill: inherit !important; /* Keep original text color */
            opacity: 1 !important;   /* Keep text opaque */
        }
        /* Remove graph-element's conflicting styles - let Graphviz set defaults, then override with !important */
        .graph-element {
            /* No conflicting fill/stroke here */
        }
    </style>
</head>
<body>
    <div class="diagram-container">
        <div id="svg-container" class="svg-container">
            {{ svg_content|safe }}
        </div>

        <div class="navigation-ui">
            {% if parent_link %}
                <a href="{{ parent_link }}" class="back-button">← Back</a>
            {% endif %}
            <button class="legend-toggle-btn" onclick="toggleLegend()" title="Legend">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 13c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm0-10c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4z" fill="currentColor"/></svg>
            </button>
        </div>

        <div class="zoom-controls">
            <button class="zoom-btn" id="zoom-in">+</button>
            <button class="zoom-btn" id="zoom-out">-</button>
        </div>

        <div class="breadcrumb">
            {% for name, link in breadcrumb %}
                <a href="{{ link }}">{{ name }}</a>{% if not loop.last %} &gt; {% endif %}
            {% endfor %}
        </div>

        <div class="legend hidden" id="legend">
            <div class="legend-header">Legend</div>
            <div class="legend-content">
                {{ legend_html|safe }}
            </div>
        </div>
    </div>

    <script src="{{ '../' * current_dir_depth }}static/js/svg-pan-zoom.min.js"></script>
    <!-- B2: severity tooltip -->
    <div id="severity-tooltip" style="display:none;position:fixed;z-index:2000;background:rgba(30,30,30,0.92);color:#fff;padding:6px 10px;border-radius:5px;font-size:12px;pointer-events:none;max-width:220px;line-height:1.4;"></div>

    <script>
        let panZoomInstance; // Declare panZoomInstance globally
        let globalGraphMetadata = null;
        let currentlySelectedElementId = null;
        let protocolVisibilityState = {};

        // B2: report URL for "View threats" link
        const REPORT_URL = '{{ report_url | default("") | safe }}';

        // B2: severity heat-map state
        const SEV_COLORS = { CRITICAL: '#dc2626', HIGH: '#ea580c', MEDIUM: '#d97706', LOW: '#16a34a' };
        let severityMap = {};
        let severityOverlayActive = false;
        let originalNodeFills = {};

        function toggleSeverityOverlay() {
            const btn = document.getElementById('severity-overlay-btn');
            const svg = document.querySelector('#svg-container svg');
            if (!svg) return;
            severityOverlayActive = !severityOverlayActive;
            if (severityOverlayActive) {
                Object.entries(severityMap).forEach(([nodeId, level]) => {
                    const g = svg.querySelector(`g[id="${CSS.escape(nodeId)}"]`);
                    if (!g) return;
                    const shape = g.querySelector('polygon,ellipse,path,rect');
                    if (!shape) return;
                    if (!originalNodeFills[nodeId]) {
                        originalNodeFills[nodeId] = { fill: shape.getAttribute('fill'), stroke: shape.getAttribute('stroke') };
                    }
                    const color = SEV_COLORS[level] || '#aaa';
                    shape.setAttribute('fill', color);
                    shape.setAttribute('stroke', color);
                });
                if (btn) { btn.textContent = '✕ Hide Heat Map'; btn.style.background = '#fee2e2'; }
            } else {
                Object.entries(originalNodeFills).forEach(([nodeId, orig]) => {
                    const g = svg.querySelector(`g[id="${CSS.escape(nodeId)}"]`);
                    if (!g) return;
                    const shape = g.querySelector('polygon,ellipse,path,rect');
                    if (!shape) return;
                    if (orig.fill !== null) shape.setAttribute('fill', orig.fill);
                    else shape.removeAttribute('fill');
                    if (orig.stroke !== null) shape.setAttribute('stroke', orig.stroke);
                    else shape.removeAttribute('stroke');
                });
                if (btn) { btn.textContent = '⬤ Show Heat Map'; btn.style.background = '#f5f5f5'; }
            }
        }

        function showSeverityTooltip(e, nodeId) {
            if (!severityOverlayActive) return;
            const level = severityMap[nodeId];
            if (!level) return;
            const meta = globalGraphMetadata && globalGraphMetadata.nodes && globalGraphMetadata.nodes[nodeId];
            const label = meta ? meta.label : nodeId;
            const tip = document.getElementById('severity-tooltip');
            let html = `<strong>${label}</strong><br>Max Severity: <span style="color:${SEV_COLORS[level]};font-weight:bold;">${level}</span>`;
            if (REPORT_URL) {
                html += `<br><a href="${REPORT_URL}#component-${nodeId}" target="_top" style="color:#90cdf4;font-size:11px;">View threats →</a>`;
            }
            tip.innerHTML = html;
            tip.style.display = 'block';
            tip.style.left = (e.clientX + 12) + 'px';
            tip.style.top  = (e.clientY + 12) + 'px';
        }

        function hideSeverityTooltip() {
            const tip = document.getElementById('severity-tooltip');
            if (tip) tip.style.display = 'none';
        }

        // Function to apply highlighting
        function highlightElement(elementId) {
            // If the clicked element is already selected, clear highlighting and return.
            if (currentlySelectedElementId === elementId) {
                clearHighlighting();
                return;
            }

            // Clear previous highlighting
            clearHighlighting();
            currentlySelectedElementId = elementId;

            const svg = document.querySelector('#svg-container svg');
            if (!svg || !globalGraphMetadata) {
                return;
            }

            // Target element can be a node or an edge
            const targetElement = globalGraphMetadata.nodes[elementId] || globalGraphMetadata.edges[elementId];
            if (!targetElement) {
                return;
            }

            // Get all visible SVG groups (nodes and edges)
            const allSvgGroups = svg.querySelectorAll('g[id]');

            // Apply faded class to all elements first
            allSvgGroups.forEach(g => g.classList.add('faded'));

            // Highlight the selected element
            const selectedSvgElement = svg.querySelector(`g[id="${CSS.escape(elementId)}"]`);
            if (selectedSvgElement) {
                selectedSvgElement.classList.add('selected');
                selectedSvgElement.classList.remove('faded');
            }

            // Highlight connected elements
            const connectedElements = new Set();
            const connectedEdges = new Set();

            if (globalGraphMetadata.nodes[elementId]) { // If a node was clicked
                globalGraphMetadata.nodes[elementId].connections.forEach(edgeId => {
                    connectedEdges.add(edgeId);
                    const edge = globalGraphMetadata.edges[edgeId];
                    if (edge) {
                        connectedElements.add(edge.source);
                        connectedElements.add(edge.target);
                    }
                });
            } else if (globalGraphMetadata.edges[elementId]) { // If an edge was clicked
                const edge = globalGraphMetadata.edges[elementId];
                if (edge) {
                    connectedElements.add(edge.source);
                    connectedElements.add(edge.target);
                    connectedEdges.add(elementId);
                }
            }

            connectedElements.forEach(connId => {
                // Special handling for boundary clusters
                if (connId.startsWith('__hidden_node_')) {
                    const originalBoundaryId = connId.replace('__hidden_node_', '');
                    const boundaryCluster = svg.querySelector(`g[id="cluster_${CSS.escape(originalBoundaryId)}"]`);
                     if (boundaryCluster) {
                        boundaryCluster.classList.add('highlighted');
                        boundaryCluster.classList.remove('faded');
                    }
                }

                const connSvgElementActual = svg.querySelector(`g[id="${CSS.escape(connId)}"]`);
                if (connSvgElementActual) {
                    connSvgElementActual.classList.add('highlighted');
                    connSvgElementActual.classList.remove('faded');
                }
            });

            connectedEdges.forEach(edgeId => {
                const edgeSvgElement = svg.querySelector(`g[id="${CSS.escape(edgeId)}"]`);
                if (edgeSvgElement) {
                    edgeSvgElement.classList.add('highlighted');
                    edgeSvgElement.classList.remove('faded');
                }
            });
        }

        // Function to clear all highlighting
        function clearHighlighting() {
            const svg = document.querySelector('#svg-container svg');
            if (!svg) return;

            const allSvgGroups = svg.querySelectorAll('g[id]');
            allSvgGroups.forEach(g => {
                g.classList.remove('selected', 'highlighted', 'faded');
            });
            currentlySelectedElementId = null;
        }

        function toggleLegend() {
            const legend = document.getElementById('legend');
            legend.classList.toggle('hidden');
        }

        function toggleProtocolVisibility(protocolClass) {
            const legendItem = document.querySelector(`.legend-item[data-protocol="${protocolClass}"]`);
            if (protocolVisibilityState[protocolClass] === 'hidden') {
                protocolVisibilityState[protocolClass] = 'visible';
                if(legendItem) legendItem.style.opacity = 1;
            } else {
                protocolVisibilityState[protocolClass] = 'hidden';
                if(legendItem) legendItem.style.opacity = 0.5;
            }
            applyProtocolVisibility();
        }

        function applyProtocolVisibility() {
            const svg = document.querySelector('#svg-container svg');
            if (!svg) return;

            const allElements = svg.querySelectorAll('g.edge');
            allElements.forEach(el => el.classList.remove('svg-element-hidden'));

            for (const protocolClass in protocolVisibilityState) {
                if (protocolVisibilityState[protocolClass] === 'hidden') {
                    const elementsToHide = svg.querySelectorAll(`.protocol-${protocolClass}`);
                    elementsToHide.forEach(el => {
                        el.classList.add('svg-element-hidden');
                    });
                }
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            var svgElement = document.querySelector('#svg-container svg');

            // Inject graph_metadata from Jinja2 context
            const rawGraphMetadata = JSON.parse('{{ graph_metadata_json | safe }}');
            if (Object.keys(rawGraphMetadata).length > 0) {
                globalGraphMetadata = rawGraphMetadata;
            } else {
                console.warn("No graph metadata provided to navigable_diagram_template.html");
            }

            // B2: inject severity map
            const rawSeverityMap = JSON.parse('{{ severity_map_json | safe }}');
            if (Object.keys(rawSeverityMap).length > 0) {
                severityMap = rawSeverityMap;
            } else {
                const sevSection = document.getElementById('severity-legend-section');
                if (sevSection) sevSection.style.display = 'none';
            }

            if (svgElement) {
                panZoomInstance = svgPanZoom(svgElement, {
                    zoomEnabled: true,
                    controlIconsEnabled: false,
                    fit: true,
                    center: true,
                    minZoom: 0.5,
                    maxZoom: 10
                });

                document.getElementById('zoom-in').addEventListener('click', function(e) {
                    e.preventDefault();
                    panZoomInstance.zoomIn();
                });

                document.getElementById('zoom-out').addEventListener('click', function(e) {
                    e.preventDefault();
                    panZoomInstance.zoomOut();
                });

                // Add a single click listener to the SVG container for event delegation
                svgElement.addEventListener('click', (e) => {
                    // Find the closest parent group that is a graph element
                    const g = e.target.closest('.graph-element');

                    if (g) {
                        // A graph element (node or edge) was clicked
                        // Check if the original click target was a link, if so, do not highlight
                        if (e.target.closest('a')) {
                            return;
                        }
                        e.stopPropagation(); // Stop event from propagating further, just in case
                        e.preventDefault(); // Prevent default link behavior if any
                        highlightElement(g.id);
                    } else {
                        // The background was clicked, clear any highlighting
                        clearHighlighting();
                    }
                });

                // Add graph-element class to all groups with an ID for easy identification by the listener
                const allSvgGroups = svgElement.querySelectorAll('g[id]');
                allSvgGroups.forEach(g => {
                    g.classList.add('graph-element');
                });

                // B2: severity tooltip on hover
                svgElement.addEventListener('mousemove', (e) => {
                    const g = e.target.closest('.graph-element');
                    if (g) showSeverityTooltip(e, g.id);
                    else hideSeverityTooltip();
                });
                svgElement.addEventListener('mouseleave', hideSeverityTooltip);

                // --- Hover effect logic for sub-model links ---
                const clickableLinks = svgElement.querySelectorAll('a');
                clickableLinks.forEach(function(link) {
                    const group = link.closest('.graph-element');
                    if (group) {
                        try {
                            group.classList.add('hover-effect');
                            group.style.cursor = 'pointer';

                            const bbox = group.getBBox();
                            const cx = bbox.x + bbox.width / 2;
                            const cy = bbox.y + bbox.height / 2;
                            group.style.transformOrigin = `${cx}px ${cy}px`;

                            group.addEventListener('mouseover', function() {
                                group.classList.add('hovered');
                            });

                            group.addEventListener('mouseout', function() {
                                group.classList.remove('hovered');
                            });
                        } catch (e) {
                            // BBox can fail on hidden elements, not critical
                        }
                    }
                });

                // Add event listener for legend item clicks
                const legend = document.getElementById('legend');
                legend.addEventListener('click', (event) => {
                    const legendItem = event.target.closest('.legend-item');
                    if (legendItem) {
                        const protocolClass = legendItem.dataset.protocol;
                        if (protocolClass) {
                            toggleProtocolVisibility(protocolClass);
                        }
                    }
                });

                applyProtocolVisibility();

            } else {
                console.warn("SVG element not found for pan/zoom and highlighting initialization.");
            }
        });
    </script>
</body>
</html>
