# =============================================================================
# config/context.yaml — DEPRECATED
# =============================================================================
#
# This file is no longer used. AI context keys are now declared directly in
# the ## Context section of your model file (.md):
#
#   ## Context
#   system_description = B2B SaaS invoicing platform. Multi-tenant. PCI DSS scope.
#   sector = Financial technology
#   deployment_environment = AWS EKS
#   data_sensitivity = Financial
#   compliance_requirements = PCI DSS, SOC 2
#   user_base = 50,000 enterprise users
#   integrations = Payment gateway, Identity provider (SAML)
#
# For per-model overrides, use a context/*.yaml file referenced from ## Context:
#
#   ## Context
#   gdaf_context = context/my_context.yaml
#
# GDAF risk thresholds have moved to config/ai_config.yaml under gdaf.risk_criteria.
# =============================================================================

# --- GDAF risk thresholds (kept here for backwards compat — prefer ai_config.yaml) ---
risk_criteria:
  acceptable_risk_score: 5.0
  max_hops: 7
  max_paths_per_objective: 3
  gdaf_min_technique_score: 0.8
