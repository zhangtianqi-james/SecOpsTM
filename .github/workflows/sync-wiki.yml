name: Sync Docs to Wiki

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'docs/**.md'

jobs:
  sync-to-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Checkout wiki repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Sync markdown files from docs
        run: |
          mkdir -p wiki

          # docs/index.md → Home (GitHub Wiki default landing page)
          # Rewrite the technical_documentation/index.md link to its wiki flat name
          sed 's|technical_documentation/index.md|technical_documentation_index.md|g' \
            docs/index.md > wiki/Home.md
          echo "Synced: docs/index.md -> wiki/Home.md"

          # Top-level docs/*.md (skip index.md, already handled above)
          find docs -maxdepth 1 -name "*.md" -type f ! -name "index.md" | while read file; do
            filename=$(basename "$file")
            cp "$file" "wiki/${filename}"
            echo "Synced: $file -> wiki/${filename}"
          done

          # docs/technical_documentation/*.md — prefixed to avoid collision with docs/index.md
          find docs/technical_documentation -name "*.md" -type f | while read file; do
            filename=$(basename "$file")
            wikiname="technical_documentation_${filename}"
            cp "$file" "wiki/${wikiname}"
            echo "Synced: $file -> wiki/${wikiname}"
          done
          
      - name: Commit and push changes to wiki
        run: |
          cd wiki
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-sync documentation from docs/"
            git push
          fi